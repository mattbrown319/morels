<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Morel Density Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍄</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --text: #eee;
      --muted: #aaa;
      --accent: #e8a838;
    }
    html, body { height: 100%; font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
    body { display: flex; flex-direction: column; }

    #header {
      padding: 12px 16px;
      padding-top: calc(12px + env(safe-area-inset-top, 0px));
      background: var(--surface);
      border-bottom: 2px solid var(--accent);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #header h1 { font-size: 16px; font-weight: 600; }
    #header a { color: var(--accent); text-decoration: none; font-size: 13px; }

    #map { flex: 1; }

    #info-panel {
      position: absolute;
      bottom: calc(16px + env(safe-area-inset-bottom, 0px));
      left: 12px;
      right: 12px;
      z-index: 1000;
      background: var(--surface);
      border-radius: 12px;
      padding: 14px 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      font-size: 13px;
      display: none;
    }
    #info-panel h3 { font-size: 15px; color: var(--accent); margin-bottom: 6px; }
    #info-panel .stat { color: var(--muted); margin-top: 4px; }
    #info-panel .stat b { color: var(--text); }

    #legend {
      position: absolute;
      top: calc(60px + env(safe-area-inset-top, 0px));
      right: 12px;
      z-index: 1000;
      background: var(--surface);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 11px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .legend-title { font-weight: 600; margin-bottom: 6px; font-size: 12px; }
    .legend-row { display: flex; align-items: center; gap: 6px; padding: 2px 0; }
    .swatch { width: 14px; height: 14px; border-radius: 3px; display: inline-block; }

    .leaflet-popup-content-wrapper { border-radius: 12px; }
    .leaflet-popup-content { margin: 12px; font-size: 13px; line-height: 1.4; }
  </style>
</head>
<body>
  <div id="header">
    <h1>Morel Sighting Density</h1>
    <a href="index.html">← Back to conditions</a>
  </div>

  <div id="map"></div>

  <div id="legend">
    <div class="legend-title">Morel Density (normalized)</div>
    <div class="legend-row"><span class="swatch" style="background:#ffffff"></span> Hotspot</div>
    <div class="legend-row"><span class="swatch" style="background:#f0f921"></span> Very high</div>
    <div class="legend-row"><span class="swatch" style="background:#fbb32f"></span> High</div>
    <div class="legend-row"><span class="swatch" style="background:#eb7852"></span> Moderate</div>
    <div class="legend-row"><span class="swatch" style="background:#9a179b"></span> Some</div>
    <div class="legend-row"><span class="swatch" style="background:#0d0887"></span> Sparse</div>
  </div>

  <div id="info-panel">
    <h3 id="info-place">Tap a hotspot</h3>
    <div class="stat" id="info-details"></div>
  </div>

  <script>
    const FRAMINGHAM = [42.2793, -71.4162];

    const map = L.map("map", {
      center: FRAMINGHAM,
      zoom: 8,
      zoomControl: false,
    });

    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
      maxZoom: 18,
    }).addTo(map);

    L.control.zoom({ position: "topright" }).addTo(map);

    // User marker
    const userIcon = L.divIcon({
      className: "",
      html: '<div style="width:14px;height:14px;background:#4285f4;border:2.5px solid #fff;border-radius:50;box-shadow:0 0 8px rgba(66,133,244,0.6)"></div>',
      iconSize: [14, 14], iconAnchor: [7, 7],
    });
    L.marker(FRAMINGHAM, { icon: userIcon, zIndex: 9999 }).addTo(map).bindPopup("Framingham, MA");

    // Color scale — fixed, doesn't change with zoom
    function scoreToColor(score) {
      if (score >= 0.8) return { fill: "#f0f921", border: "#fbb32f", opacity: 0.85 };
      if (score >= 0.6) return { fill: "#fbb32f", border: "#eb7852", opacity: 0.75 };
      if (score >= 0.4) return { fill: "#eb7852", border: "#cb4679", opacity: 0.65 };
      if (score >= 0.2) return { fill: "#cb4679", border: "#9a179b", opacity: 0.55 };
      if (score >= 0.05) return { fill: "#5b02a3", border: "#5b02a3", opacity: 0.45 };
      return { fill: "#0d0887", border: "#0d0887", opacity: 0.35 };
    }

    fetch("data/density-heatmap.json")
      .then(r => r.json())
      .then(data => {
        const infoPanel = document.getElementById("info-panel");
        const infoPlace = document.getElementById("info-place");
        const infoDetails = document.getElementById("info-details");

        const maxWeight = Math.max(...data.points.map(p => p.w));

        // Fixed-color circles — stable at every zoom level
        for (const p of data.points) {
          const score = p.w / maxWeight;
          const c = scoreToColor(score);
          const size = 5 + score * 12;

          const circle = L.circleMarker([p.lat, p.lon], {
            radius: size,
            fillColor: c.fill,
            color: c.border,
            weight: 1,
            fillOpacity: c.opacity,
          }).addTo(map);

          // Popup on tap
          const cellKey = p.lat.toFixed(2) + "," + p.lon.toFixed(2);
          const cell = data.cells[cellKey];
          if (cell) {
            circle.on("click", (e) => {
              L.DomEvent.stopPropagation(e);
              infoPanel.style.display = "block";
              infoPlace.textContent = cell.p || `${p.lat.toFixed(2)}°N, ${p.lon.toFixed(2)}°W`;

              const confidence = cell.pr > 5
                ? '<br><span style="color:#888">Near urban area — normalized down</span>'
                : cell.pr <= 1.5
                  ? '<br><span style="color:#fbb32f">Rural area — high confidence</span>'
                  : "";

              infoDetails.innerHTML =
                `<b>${cell.n}</b> sightings across <b>${cell.y}</b> years<br>` +
                `Peak timing: <b>${cell.pk}</b>${confidence}`;
            });
          }
        }

        map.on("click", () => { infoPanel.style.display = "none"; });
      });
  </script>
</body>
</html>

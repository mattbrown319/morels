<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Morel Density Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍄</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --text: #222;
      --muted: #666;
      --accent: #d84315;
    }
    html, body { height: 100%; font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
    body { display: flex; flex-direction: column; }

    #header {
      padding: 12px 16px;
      padding-top: calc(12px + env(safe-area-inset-top, 0px));
      background: var(--surface);
      border-bottom: 1px solid #ddd;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #header h1 { font-size: 16px; font-weight: 600; }
    #header a { color: var(--accent); text-decoration: none; font-size: 13px; }

    #map { flex: 1; }

    #info-panel {
      position: absolute;
      bottom: calc(16px + env(safe-area-inset-bottom, 0px));
      left: 12px;
      right: 12px;
      z-index: 1000;
      background: var(--surface);
      border-radius: 12px;
      padding: 14px 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      font-size: 13px;
      display: none;
    }
    #info-panel h3 { font-size: 15px; color: var(--accent); margin-bottom: 6px; }
    #info-panel .stat { color: var(--muted); margin-top: 4px; }
    #info-panel .stat b { color: var(--text); }

    #legend {
      position: absolute;
      top: calc(60px + env(safe-area-inset-top, 0px));
      right: 12px;
      z-index: 1000;
      background: var(--surface);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 11px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    .legend-title { font-weight: 600; margin-bottom: 6px; font-size: 12px; }
    .legend-row { display: flex; align-items: center; gap: 6px; padding: 2px 0; }
    .swatch { width: 14px; height: 14px; border-radius: 3px; display: inline-block; }

    .leaflet-popup-content-wrapper { border-radius: 12px; }
    .leaflet-popup-content { margin: 12px; font-size: 13px; line-height: 1.4; }
  </style>
</head>
<body>
  <div id="header">
    <h1>Morel Sighting Density</h1>
    <div>
      <label style="font-size:13px;cursor:pointer">
        <input type="checkbox" id="toggle-habitat"> Show unconfirmed habitat
      </label>
      &nbsp;
      <a href="index.html">← Conditions</a>
    </div>
  </div>

  <div id="map"></div>

  <div id="legend">
    <div class="legend-title">Morel Likelihood</div>
    <div class="legend-row"><span class="swatch" style="background:#d32f2f"></span> Strong history</div>
    <div class="legend-row"><span class="swatch" style="background:#f57c00"></span> Some finds</div>
    <div class="legend-row"><span class="swatch" style="background:#ffb74d"></span> Occasional</div>
    <div id="legend-habitat" style="display:none">
      <div style="border-top:1px solid #ddd;margin:6px 0"></div>
      <div class="legend-row"><span class="swatch" style="background:#4caf50;opacity:0.5"></span> Promising habitat</div>
      <div class="legend-row"><span class="swatch" style="background:#8bc34a;opacity:0.3"></span> Possible habitat</div>
    </div>
  </div>

  <div id="info-panel">
    <h3 id="info-place">Tap a hotspot</h3>
    <div class="stat" id="info-details"></div>
  </div>

  <script>
    const FRAMINGHAM = [42.2793, -71.4162];

    const map = L.map("map", {
      center: FRAMINGHAM,
      zoom: 8,
      zoomControl: false,
    });

    L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
      maxZoom: 18,
      attribution: '&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://osm.org/copyright">OSM</a>',
    }).addTo(map);

    L.control.zoom({ position: "topright" }).addTo(map);

    // User marker
    const userIcon = L.divIcon({
      className: "",
      html: '<div style="width:14px;height:14px;background:#1565c0;border:2.5px solid #fff;border-radius:50%;box-shadow:0 0 8px rgba(21,101,192,0.5)"></div>',
      iconSize: [14, 14], iconAnchor: [7, 7],
    });
    L.marker(FRAMINGHAM, { icon: userIcon, zIndex: 9999 }).addTo(map).bindPopup("Framingham, MA");

    // Color scale for light basemap — warm tones that don't obscure the map
    function scoreToColor(score) {
      if (score >= 0.8) return { fill: "#d32f2f", border: "#b71c1c", opacity: 0.7 };
      if (score >= 0.6) return { fill: "#e65100", border: "#bf360c", opacity: 0.6 };
      if (score >= 0.4) return { fill: "#f57c00", border: "#e65100", opacity: 0.5 };
      if (score >= 0.2) return { fill: "#ffb74d", border: "#f57c00", opacity: 0.4 };
      if (score >= 0.05) return { fill: "#ffe0b2", border: "#ffb74d", opacity: 0.3 };
      return { fill: "#fff3e0", border: "#ffe0b2", opacity: 0.25 };
    }

    fetch("data/density-heatmap.json")
      .then(r => r.json())
      .then(data => {
        const infoPanel = document.getElementById("info-panel");
        const infoPlace = document.getElementById("info-place");
        const infoDetails = document.getElementById("info-details");

        const maxWeight = Math.max(...data.points.map(p => p.w));

        // Fixed-color circles — stable at every zoom level
        for (const p of data.points) {
          const score = p.w / maxWeight;
          const c = scoreToColor(score);
          const size = 5 + score * 12;

          const circle = L.circleMarker([p.lat, p.lon], {
            radius: size,
            fillColor: c.fill,
            color: c.border,
            weight: 1,
            fillOpacity: c.opacity,
          }).addTo(map);

          // Popup on tap
          const cellKey = p.lat.toFixed(2) + "," + p.lon.toFixed(2);
          const cell = data.cells[cellKey];
          if (cell) {
            circle.on("click", (e) => {
              L.DomEvent.stopPropagation(e);
              infoPanel.style.display = "block";
              infoPlace.textContent = cell.p || `${p.lat.toFixed(2)}°N, ${p.lon.toFixed(2)}°W`;

              const confidence = cell.pr > 5
                ? '<br><span style="color:#888">Near urban area — normalized down</span>'
                : cell.pr <= 1.5
                  ? '<br><span style="color:#fbb32f">Rural area — high confidence</span>'
                  : "";

              infoDetails.innerHTML =
                `<b>${cell.n}</b> sightings across <b>${cell.y}</b> years<br>` +
                `Peak timing: <b>${cell.pk}</b>${confidence}`;
            });
          }
        }

        map.on("click", () => { infoPanel.style.display = "none"; });
      });

    // Habitat layer (unconfirmed promising areas)
    let habitatLayer = null;

    const HABITAT_STYLES = {
      promising: { fill: "#4caf50", border: "#388e3c", opacity: 0.35, label: "Promising — deciduous forest, no morel reports yet" },
      possible:  { fill: "#8bc34a", border: "#689f38", opacity: 0.2, label: "Possible — mixed forest" },
    };

    async function loadHabitat() {
      if (habitatLayer) { map.removeLayer(habitatLayer); habitatLayer = null; }

      const checked = document.getElementById("toggle-habitat").checked;
      document.getElementById("legend-habitat").style.display = checked ? "block" : "none";
      if (!checked) return;

      try {
        const resp = await fetch("data/habitat.json");
        if (!resp.ok) return;
        const data = await resp.json();

        const markers = [];
        for (const h of data) {
          if (h.cat === "confirmed") continue; // already shown by density circles
          const style = HABITAT_STYLES[h.cat];
          if (!style) continue;

          const rect = L.rectangle(
            [[h.lat - 0.025, h.lon - 0.025], [h.lat + 0.025, h.lon + 0.025]],
            { color: style.border, fillColor: style.fill, fillOpacity: style.opacity, weight: 0.5 }
          );
          rect.bindPopup(`<div style="font-size:13px"><b>${style.label}</b><br>
            <span style="color:#666">NLCD class: ${h.nlcd === 41 ? "Deciduous Forest" : h.nlcd === 43 ? "Mixed Forest" : "Evergreen Forest"}</span><br>
            <span style="color:#4caf50">No morel sightings reported here — could be undiscovered!</span></div>`);
          markers.push(rect);
        }

        habitatLayer = L.layerGroup(markers).addTo(map);
      } catch (err) {
        console.warn("Habitat layer failed:", err);
      }
    }

    document.getElementById("toggle-habitat").addEventListener("change", loadHabitat);

    // Load sightings as clustered markers
    fetch("data/sightings-ne.geojson")
      .then(r => r.json())
      .then(data => {
        const cluster = L.markerClusterGroup({
          maxClusterRadius: 30,
          showCoverageOnHover: false,
          iconCreateFunction: (c) => {
            const n = c.getChildCount();
            const size = n >= 20 ? 36 : n >= 5 ? 30 : 24;
            return L.divIcon({
              html: `<div style="width:${size}px;height:${size}px;border-radius:50%;background:rgba(120,80,40,0.8);border:2px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:11px;box-shadow:0 1px 4px rgba(0,0,0,0.3)">${n}</div>`,
              iconSize: [size, size],
              className: "",
            });
          },
        });

        data.features.forEach(f => {
          const p = f.properties;
          const [lon, lat] = f.geometry.coordinates;
          const color = p.quality === "research" ? "#5d4037" : "#8d6e63";

          const icon = L.divIcon({
            className: "",
            html: `<div style="width:8px;height:8px;border-radius:50%;background:${color};border:1.5px solid #fff;box-shadow:0 1px 2px rgba(0,0,0,0.3)"></div>`,
            iconSize: [8, 8],
            iconAnchor: [4, 4],
          });

          const marker = L.marker([lat, lon], { icon });

          let popup = `<div style="font-size:13px">
            <b>${p.species}</b><br>
            <span style="color:#666">${p.date} ${p.common ? "· " + p.common : ""}</span>`;
          if (p.photo) popup += `<br><img src="${p.photo}" style="width:100%;border-radius:6px;margin-top:6px" loading="lazy">`;
          if (p.uri) popup += `<br><a href="${p.uri}" target="_blank" style="color:#1565c0;font-size:12px">View on iNaturalist</a>`;
          popup += `</div>`;

          marker.bindPopup(popup, { maxWidth: 220 });
          cluster.addLayer(marker);
        });

        map.addLayer(cluster);
      });
  </script>
</body>
</html>
